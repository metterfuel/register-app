<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>レジ</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

body {
font-family: ‘Helvetica Neue’, Arial, ‘Hiragino Sans’, ‘Hiragino Kaku Gothic ProN’, sans-serif;
background: #1e1e1e;
color: #ffffff;
min-height: 100vh;
display: flex;
flex-direction: column;
max-width: 430px;
margin: 0 auto;
}

header {
background: #2a2a2a;
border-bottom: 1px solid #444444;
padding: 14px 16px 12px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 10;
}

header h1 {
font-size: 18px;
font-weight: 700;
color: #7ec87e;
}

.tax-badge {
font-size: 11px;
background: #2979ff;
color: #ffffff;
padding: 4px 10px;
border-radius: 20px;
font-weight: 700;
}

.input-area {
background: #2a2a2a;
border-bottom: 1px solid #444444;
padding: 12px;
}

.input-row {
display: flex;
flex-direction: row;
gap: 8px;
align-items: flex-end;
}

.field {
display: flex;
flex-direction: column;
gap: 4px;
}

.field-price {
flex: 2;
min-width: 0;
}

.field-qty {
flex: 1;
min-width: 0;
}

.field-btn {
flex: 0 0 64px;
}

.field label {
font-size: 10px;
font-weight: 700;
color: #888888;
letter-spacing: 0.06em;
display: block;
margin-bottom: 4px;
}

.field input {
background: #333333;
border: 1.5px solid #444444;
border-radius: 10px;
color: #ffffff;
font-size: 16px;
padding: 10px 10px;
outline: none;
width: 100%;
display: block;
-webkit-appearance: none;
appearance: none;
}

.field input:focus {
border-color: #7ec87e;
}

.field input::placeholder {
color: #666666;
}

.add-btn {
width: 100%;
background: #2979ff;
color: #ffffff;
border: none;
border-radius: 10px;
padding: 11px 4px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
}

.add-btn:active {
background: #1a5acc;
}

.items-wrap {
flex: 1;
overflow-y: auto;
padding: 12px 16px;
display: flex;
flex-direction: column;
gap: 8px;
}

.empty-msg {
text-align: center;
color: #888888;
font-size: 13px;
margin-top: 40px;
line-height: 2;
}

.empty-msg .icon {
font-size: 36px;
display: block;
margin-bottom: 8px;
}

.item-card {
background: #333333;
border: 1px solid #444444;
border-radius: 12px;
padding: 12px 14px;
display: flex;
flex-direction: row;
align-items: center;
justify-content: space-between;
position: relative;
}

.item-left {
flex: 1;
min-width: 0;
}

.item-name {
font-size: 14px;
font-weight: 500;
color: #ffffff;
}

.item-sub {
font-size: 11px;
color: #aaaaaa;
margin-top: 3px;
}

.item-total {
font-size: 17px;
font-weight: 700;
color: #7ec87e;
white-space: nowrap;
margin-left: 12px;
}

.del-btn {
display: none;
position: absolute;
top: 6px;
right: 6px;
background: none;
border: none;
color: #e07070;
font-size: 18px;
cursor: pointer;
padding: 4px 6px;
line-height: 1;
}

.item-card.editing .del-btn {
display: block;
}

footer {
background: #2a2a2a;
border-top: 1px solid #444444;
padding: 16px 16px 28px;
}

.totals {
display: flex;
flex-direction: column;
gap: 6px;
margin-bottom: 14px;
}

.total-row {
display: flex;
flex-direction: row;
justify-content: space-between;
align-items: center;
}

.total-label {
font-size: 12px;
color: #aaaaaa;
font-weight: 500;
}

.total-val {
font-size: 14px;
color: #aaaaaa;
font-weight: 600;
}

.divider {
border: none;
border-top: 1px dashed #444444;
margin: 6px 0;
}

.grand .total-label {
font-size: 15px;
color: #ffffff;
font-weight: 700;
}

.grand .total-val {
font-size: 22px;
color: #7ec87e;
font-weight: 700;
}

.footer-btns {
display: flex;
flex-direction: row;
gap: 10px;
}

.clear-btn {
flex: 1;
background: transparent;
border: 1.5px solid #e07070;
color: #e07070;
border-radius: 12px;
padding: 13px;
font-size: 14px;
font-weight: 700;
cursor: pointer;
}

.clear-btn:active {
background: rgba(224,112,112,0.15);
}

.pay-btn {
flex: 2;
background: #2979ff;
border: none;
color: #ffffff;
border-radius: 12px;
padding: 13px;
font-size: 15px;
font-weight: 700;
cursor: pointer;
}

.pay-btn:active {
background: #1a5acc;
}

.modal-overlay {
display: none;
position: fixed;
top: 0;
left: 0;
right: 0;
bottom: 0;
background: rgba(0,0,0,0.7);
z-index: 100;
align-items: flex-end;
}

.modal-overlay.show {
display: flex;
}

.modal {
background: #2a2a2a;
border-radius: 20px 20px 0 0;
padding: 24px 20px 40px;
width: 100%;
text-align: center;
}

.modal h2 {
font-size: 18px;
font-weight: 700;
color: #7ec87e;
margin-bottom: 20px;
}

.receipt-row {
display: flex;
flex-direction: row;
justify-content: space-between;
font-size: 13px;
padding: 4px 0;
color: #aaaaaa;
}

.receipt-total {
font-size: 28px;
font-weight: 700;
color: #7ec87e;
margin: 16px 0 6px;
}

.receipt-note {
font-size: 11px;
color: #888888;
margin-bottom: 20px;
}

.modal-close {
width: 100%;
background: #333333;
border: 1.5px solid #444444;
color: #ffffff;
border-radius: 12px;
padding: 14px;
font-size: 15px;
font-weight: 700;
cursor: pointer;
margin-top: 10px;
}
</style>

</head>
<body>

<header>
  <h1>🧾 レジ</h1>
  <span class="tax-badge">消費税 10%</span>
</header>

<div class="input-area">
  <div class="input-row">
    <div class="field field-price">
      <label>単価（円）</label>
      <input type="number" id="itemPrice" placeholder="0" min="0" inputmode="decimal">
    </div>
    <div class="field field-qty">
      <label>数量</label>
      <input type="number" id="itemQty" placeholder="1" min="0" step="any" inputmode="decimal">
    </div>
    <div class="field field-btn">
      <label style="opacity:0;">-</label>
      <button class="add-btn" onclick="addItem()">追加</button>
    </div>
  </div>
</div>

<div class="items-wrap" id="itemList">
  <div class="empty-msg">
    <span class="icon">🛒</span>
    商品を追加してください
  </div>
</div>

<footer>
  <div class="totals">
    <div class="total-row">
      <span class="total-label">税抜合計</span>
      <span class="total-val" id="subtotalDisp">¥0</span>
    </div>
    <div class="total-row">
      <span class="total-label">消費税（10%）</span>
      <span class="total-val" id="taxDisp">¥0</span>
    </div>
    <hr class="divider">
    <div class="total-row grand">
      <span class="total-label">お会計（税込）</span>
      <span class="total-val" id="totalDisp">¥0</span>
    </div>
  </div>
  <div class="footer-btns">
    <button class="clear-btn" onclick="clearAll()">クリア</button>
    <button class="pay-btn" onclick="showModal()">お会計</button>
  </div>
</footer>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h2>お会計</h2>
    <div id="receiptItems"></div>
    <hr class="divider" style="margin:12px 0">
    <div class="receipt-row"><span>税抜合計</span><span id="mSubtotal">¥0</span></div>
    <div class="receipt-row"><span>消費税（10%）</span><span id="mTax">¥0</span></div>
    <div class="receipt-total" id="mTotal">¥0</div>
    <div class="receipt-note">※ 税込金額は10の位以下切り捨て</div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
var items = [];

function fmt(n) {
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}

function calcIncl(price, qty) {
  var rawIncl = price * qty * 1.1;
  return Math.floor(rawIncl / 100) * 100;
}

function addItem() {
  var priceEl = document.getElementById('itemPrice');
  var qtyEl   = document.getElementById('itemQty');
  var price   = parseFloat(priceEl.value);
  var qty     = parseFloat(qtyEl.value);

  if (isNaN(price) || price < 0) { priceEl.focus(); return; }
  if (isNaN(qty)   || qty <= 0)  { qtyEl.focus();   return; }

  var inclTotal = calcIncl(price, qty);
  var exclTotal = Math.round(inclTotal / 1.1);
  var taxTotal  = inclTotal - exclTotal;

  items.push({ price: price, qty: qty, inclTotal: inclTotal, exclTotal: exclTotal, taxTotal: taxTotal });
  render();

  priceEl.value = '';
  qtyEl.value   = '';
  priceEl.focus();
}

function deleteItem(i) {
  items.splice(i, 1);
  render();
}

function render() {
  var list = document.getElementById('itemList');

  if (items.length === 0) {
    list.innerHTML = '<div class="empty-msg"><span class="icon">🛒</span>商品を追加してください</div>';
    updateTotals(0, 0, 0);
    return;
  }

  var totalIncl = 0, totalExcl = 0, totalTax = 0;
  for (var j = 0; j < items.length; j++) {
    totalIncl += items[j].inclTotal;
    totalExcl += items[j].exclTotal;
    totalTax  += items[j].taxTotal;
  }

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    var qtyStr = (it.qty % 1 === 0) ? String(it.qty) : String(it.qty);
    html += '<div class="item-card" onclick="toggleEdit(this)">';
    html += '<button class="del-btn" onclick="event.stopPropagation();deleteItem(' + i + ')">✕</button>';
    html += '<div class="item-left">';
    html += '<div class="item-name">¥' + it.price.toLocaleString() + ' × ' + qtyStr + '</div>';
    html += '<div class="item-sub">税抜 ¥' + it.exclTotal.toLocaleString() + ' ／ 税 ¥' + it.taxTotal.toLocaleString() + '</div>';
    html += '</div>';
    html += '<div class="item-total">¥' + it.inclTotal.toLocaleString() + '</div>';
    html += '</div>';
  }
  list.innerHTML = html;

  updateTotals(totalIncl, totalExcl, totalTax);
}

function toggleEdit(card) {
  card.classList.toggle('editing');
}

function updateTotals(incl, excl, tax) {
  document.getElementById('subtotalDisp').textContent = fmt(excl);
  document.getElementById('taxDisp').textContent      = fmt(tax);
  document.getElementById('totalDisp').textContent    = fmt(incl);
}

function clearAll() {
  if (items.length === 0) return;
  if (!confirm('明細をすべてクリアしますか？')) return;
  items = [];
  render();
}

function showModal() {
  if (items.length === 0) return;
  var totalIncl = 0, totalExcl = 0, totalTax = 0;
  var rows = '';
  for (var i = 0; i < items.length; i++) {
    var it = items[i];
    totalIncl += it.inclTotal;
    totalExcl += it.exclTotal;
    totalTax  += it.taxTotal;
    rows += '<div class="receipt-row"><span>¥' + it.price.toLocaleString() + ' × ' + it.qty + '</span><span>¥' + it.inclTotal.toLocaleString() + '</span></div>';
  }
  document.getElementById('receiptItems').innerHTML = rows;
  document.getElementById('mSubtotal').textContent = fmt(totalExcl);
  document.getElementById('mTax').textContent      = fmt(totalTax);
  document.getElementById('mTotal').textContent    = fmt(totalIncl);
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

document.getElementById('itemPrice').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('itemQty').focus();
});
document.getElementById('itemQty').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addItem();
});
</script>

</body>
</html>
